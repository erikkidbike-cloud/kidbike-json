<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Kalender</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --accent: #5bb1c0;
      --accent-hover: #4a9dae;
      --accent-light: #eaf6f8;
      --bg: transparent;
      --card-bg: #ffffff;
      --text-main: #1f2937;
      --text-muted: #6b7280;
      --border: #e5e7eb;
    }

    html, body {
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text-main);
      overflow-x: hidden;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 16px;
    }

    h1 {
      font-size: 24px;
      margin: 0 0 24px 0;
      color: var(--text-main);
      border-bottom: 2px solid var(--accent);
      display: inline-block;
      padding-bottom: 6px;
    }

    .grid {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: row;
      align-items: stretch;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      overflow: hidden;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
      border-color: var(--accent);
    }

    .date-badge {
      flex: 0 0 96px;
      background: var(--accent-light);
      color: var(--accent-hover);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 14px 8px;
      border-right: 1px solid var(--border);
      text-align: center;
    }

    .date-badge .weekday {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--accent);
      margin-bottom: 2px;
    }

    .date-badge .day {
      font-size: 30px;
      font-weight: 800;
      line-height: 1;
      color: var(--accent-hover);
    }

    .date-badge .month {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .date-badge .time {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-main);
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
      width: 100%;
    }

    .card-body {
      flex: 1;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 0;
    }

    .card-body h3 {
      margin: 0;
      font-size: 18px;
      line-height: 1.3;
    }

    .card-body p {
      margin: 0;
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .card .link-hint {
      margin-top: auto;
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .card:hover .link-hint {
      color: var(--accent-hover);
    }

    .loading, .empty, .error {
      color: var(--text-muted);
      font-size: 15px;
      padding: 20px 0;
    }

    @media (max-width: 480px) {
      .date-badge {
        flex: 0 0 76px;
        padding: 10px 6px;
      }
      .date-badge .day {
        font-size: 24px;
      }
      .card-body {
        padding: 14px 16px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Kalender</h1>
    <div id="events-grid" class="grid">
      <div class="loading">Termine werden geladen...</div>
    </div>
  </div>

  <script>
    const JSON_URL = 'events-we.json'; 

    async function loadEvents() {
      const grid = document.getElementById('events-grid');
      
      try {
        const res = await fetch(JSON_URL + '?v=' + Date.now());
        if (!res.ok) throw new Error('Netzwerkfehler');
        const rawData = await res.json();
        
        const now = new Date();

        // Filter op basis van nieuwe korte sleutel 'fg'
        const filteredEvents = rawData.filter(ev => {
          const isProject = String(ev.fg || '').toUpperCase() === 'WAHR' || 
                            String(ev.fg || '').toUpperCase() === 'TRUE' ||
                            ev.fg === true ||
                            ev.fg === '1';
                            
          const eventDate = new Date(ev.start);
          const isFuture = eventDate >= now || new Date(ev.end || eventDate) >= now;

          return isProject && isFuture;
        });

        filteredEvents.sort((a, b) => new Date(a.start) - new Date(b.start));

        grid.innerHTML = '';

        if (filteredEvents.length === 0) {
          grid.innerHTML = '<div class="empty">Momentan stehen keine Termine an.</div>';
          notifyEmbedResize();
          return;
        }

        filteredEvents.forEach(ev => {
          const startObj = new Date(ev.start);
          const weekdayStr = startObj.toLocaleDateString('de-DE', { weekday: 'short' });
          const dayStr = startObj.toLocaleDateString('de-DE', { day: '2-digit' });
          const monthStr = startObj.toLocaleDateString('de-DE', { month: 'short' });
          const timeStr = startObj.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });

          // Gebruik de nieuwe korte sleutels
          const title = ev.titelFg || 'Veranstaltung';
          const desc = ev.beschrFg || '';
          const url = ev.linkFg || '#';

          const card = document.createElement(url !== '#' ? 'a' : 'div');
          card.className = 'card';
          if (url !== '#') {
            card.href = url;
            card.target = '_blank';
            card.rel = 'noopener noreferrer';
          }

          card.innerHTML = `
            <div class="date-badge">
              <div class="weekday">${weekdayStr}</div>
              <div class="day">${dayStr}</div>
              <div class="month">${monthStr}</div>
              <div class="time">${timeStr} Uhr</div>
            </div>
            <div class="card-body">
              <h3>${title}</h3>
              ${desc ? `<p>${desc}</p>` : ''}
              ${url !== '#' ? `<div class="link-hint">Mehr erfahren &rarr;</div>` : ''}
            </div>
          `;

          grid.appendChild(card);
        });

        notifyEmbedResize();

      } catch (error) {
        console.error("Fout:", error);
        grid.innerHTML = '<div class="error">Die Termine konnten leider nicht geladen werden.</div>';
      }
    }

    function notifyEmbedResize() {
      setTimeout(() => {
        const height = document.body.scrollHeight || document.documentElement.scrollHeight;
        window.parent.postMessage({ type: 'embed-size', height: height }, '*');
      }, 100);
    }

    window.addEventListener('resize', notifyEmbedResize);
    loadEvents();
  </script>
</body>
</html>
